<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
text-align:center;
}

header{
background:#1e40af;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

.card{
background:white;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

#reader{
width:100%;
margin:auto;
}

.divider{
margin:20px 0;
font-weight:bold;
color:#777;
}

.search-container{
position:relative;
}

input{
padding:12px;
width:100%;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.suggestions{
position:absolute;
width:100%;
background:white;
border:1px solid #ccc;
border-top:none;
max-height:220px;
overflow-y:auto;
display:none;
text-align:left;
z-index:1000;
}

.suggestion-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion-item:hover{
background:#f3f4f6;
}

button.submit{
padding:12px;
width:100%;
margin-top:10px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

</style>
</head>

<body>

<header id="title">Loading...</header>

<div class="card">

<h3>Scan QR Code</h3>
<div id="reader"></div>

<div class="divider">──────── OR ────────</div>

<h3>Manual Attendance</h3>

<div class="search-container">
<input id="nameInput" placeholder="Type name..." autocomplete="off">
<div id="suggestions" class="suggestions"></div>
</div>

<button class="submit" onclick="submitManual()">Submit Attendance</button>

</div>

<div id="loadingOverlay">
<p style="margin-top:20px;font-weight:bold;color:#1e40af">
Checking record...
</p>
</div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbyAhyftbAPUonU0nHTnV-5x-HCBq452lXyK5769amWy3THmiUX7h0KDJdIrgnnthBCaXA/exec"

const params=new URLSearchParams(window.location.search)
const FLOOR=params.get("floor")||"1stFloor"

document.getElementById("title").innerText="Attendance - "+FLOOR

let regularNames=[]
let elementaryNames=[]
let searchPool=[]

/* LOAD NAMES */

async function loadNames(){

const regularRes=await fetch(BACKEND_URL+"?action=getRegularNames")
const regularData=await regularRes.json()

regularNames=regularData.names||[]

const elemRes=await fetch(BACKEND_URL+"?action=getElementaryNames")
const elemData=await elemRes.json()

elementaryNames=elemData.names||[]

searchPool=[
...regularNames.map(n=>({name:n,type:"regular"})),
...elementaryNames.map(n=>({name:n,type:"elementary"}))
]

console.log("Regular:",regularNames.length)
console.log("Elementary:",elementaryNames.length)

}

/* FAST SEARCH ENGINE */

const input=document.getElementById("nameInput")
const suggestions=document.getElementById("suggestions")

let debounceTimer=null

input.addEventListener("input",function(){

clearTimeout(debounceTimer)

debounceTimer=setTimeout(()=>{

const query=this.value.toLowerCase().trim()

suggestions.innerHTML=""

if(!query){
suggestions.style.display="none"
return
}

const results=[]

for(let i=0;i<searchPool.length;i++){

let name=searchPool[i].name

if(name.toLowerCase().includes(query)){

results.push(searchPool[i])

if(results.length>=10) break

}

}

if(results.length===0){
suggestions.style.display="none"
return
}

results.forEach(r=>{

const div=document.createElement("div")
div.className="suggestion-item"
div.textContent=r.name+" ("+r.type+")"

div.onclick=function(){
input.value=r.name
input.dataset.type=r.type
suggestions.style.display="none"
}

suggestions.appendChild(div)

})

suggestions.style.display="block"

},80)

})

document.addEventListener("click",function(e){

if(!e.target.closest(".search-container"))
suggestions.style.display="none"

})

/* RESULT */

function showResult(message,success){

const overlay=document.getElementById("loadingOverlay")

overlay.innerHTML=""

overlay.style.display="flex"

overlay.style.background=success?
"linear-gradient(#065f46,#10b981)":
"linear-gradient(#7f1d1d,#dc2626)"

const card=document.createElement("div")

card.style.background="rgba(0,0,0,0.15)"
card.style.padding="40px"
card.style.borderRadius="16px"
card.style.color="white"
card.style.fontSize="22px"
card.style.fontWeight="bold"

card.innerText=message

overlay.appendChild(card)

setTimeout(()=>location.reload(),3500)

}

/* SEND QR */

async function sendQR(qr){

document.getElementById("loadingOverlay").style.display="flex"

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`floor=${FLOOR}&qr=${encodeURIComponent(qr)}`
})

const data=await res.json()

showResult(data.message,data.success)

}

/* MANUAL */

async function submitManual(){

const name=input.value.trim()

if(!name){
alert("Please enter name")
return
}

let type=input.dataset.type

if(!type){

if(regularNames.includes(name)) type="regular"
else if(elementaryNames.includes(name)) type="elementary"
else{
alert("Name not found")
return
}

}

document.getElementById("loadingOverlay").style.display="flex"

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`floor=${FLOOR}&type=${type}&manualName=${encodeURIComponent(name)}`
})

const data=await res.json()

showResult(data.message,data.success)

}

/* QR */

function startScanner(){

const qr=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

if(devices.length){

qr.start(
devices[0].id,
{fps:10,qrbox:250},
msg=>{
qr.stop()
sendQR(msg)
}
)

}

})

}

startScanner()
loadNames()

</script>

</body>
</html>
