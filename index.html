<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
}

/* OR Divider */
.divider{
  margin:25px 0;
  font-weight:bold;
  color:#666;
}

/* Smart Search */
.search-container{
  position:relative;
  width:80%;
  max-width:400px;
  margin:auto;
}

#nameInput{
  padding:12px;
  width:100%;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

#suggestions{
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  border-top:none;
  max-height:200px;
  overflow-y:auto;
  display:none;
  text-align:left;
  z-index:1000;
}

.suggestion-item{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.suggestion-item:hover{
  background:#f3f4f6;
}

button{
  padding:12px 25px;
  font-size:16px;
  background:#1e40af;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

/* Loading Overlay */
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

/* Book Animation */
.book {
  width: 90px;
  height: 65px;
  position: relative;
  perspective: 800px;
}

.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #2b6cb0, #1e4e8c);
  border-radius: 6px;
  box-shadow: 0 12px 20px rgba(0,0,0,0.25);
}

.spine {
  position: absolute;
  left: -6px;
  width: 8px;
  height: 100%;
  background: #173a6a;
  border-radius: 4px 0 0 4px;
}

.flip {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #3b82f6, #1e40af);
  border-radius: 6px;
  transform-origin: left;
  animation: realisticFlip 1.4s infinite ease-in-out;
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

.page {
  position: absolute;
  width: 96%;
  height: 92%;
  background: #ffffff;
  top: 4%;
  left: 2%;
  border-radius: 4px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.08);
}

@keyframes realisticFlip {
  0%   { transform: rotateY(0deg); }
  50%  { transform: rotateY(-170deg); }
  100% { transform: rotateY(0deg); }
}
</style>
</head>

<body>

<h2 id="title">Loading...</h2>

<!-- QR SCAN -->
<div id="reader" style="width:100%;max-width:500px;margin:auto;"></div>

<div class="divider">──────── OR ────────</div>

<!-- SMART SEARCH -->
<h3>Search Your Name</h3>

<div class="search-container">
  <input id="nameInput" placeholder="Type your family name..." autocomplete="off">
  <div id="suggestions"></div>
</div>

<button onclick="submitManual()">Submit Attendance</button>

<h3 id="result"></h3>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="book">
    <div class="cover"></div>
    <div class="spine"></div>
    <div class="page"></div>
    <div class="flip"></div>
  </div>
  <p style="margin-top:22px;font-weight:bold;color:#1e40af;">
    Checking record...
  </p>
</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyAhyftbAPUonU0nHTnV-5x-HCBq452lXyK5769amWy3THmiUX7h0KDJdIrgnnthBCaXA/exec";

const params = new URLSearchParams(window.location.search);
const FLOOR = params.get("floor") || "1stFloor";

document.getElementById("title").innerText = "Attendance - " + FLOOR;

let allNames = [];

/* LOAD NAMES */
async function loadNames() {
  const response = await fetch(BACKEND_URL + "?action=getNames");
  const data = await response.json();
  allNames = data.names;
}

/* SMART FILTER */
const input = document.getElementById("nameInput");
const suggestionsBox = document.getElementById("suggestions");

input.addEventListener("input", function() {

  const query = this.value.toLowerCase();
  suggestionsBox.innerHTML = "";

  if (!query) {
    suggestionsBox.style.display = "none";
    return;
  }

  const filtered = allNames.filter(name =>
    name.toLowerCase().includes(query)
  );

  if (filtered.length === 0) {
    suggestionsBox.style.display = "none";
    return;
  }

  filtered.slice(0, 10).forEach(name => {

    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.textContent = name;

    div.onclick = function() {
      input.value = name;
      suggestionsBox.style.display = "none";
    };

    suggestionsBox.appendChild(div);
  });

  suggestionsBox.style.display = "block";
});

document.addEventListener("click", function(e) {
  if (!e.target.closest(".search-container")) {
    suggestionsBox.style.display = "none";
  }
});

/* RESULT SCREEN */
function showResult(message, success) {

  const overlay = document.getElementById("loadingOverlay");
  overlay.innerHTML = "";
  overlay.style.display = "flex";

  overlay.style.background = success
    ? "linear-gradient(to bottom, #065f46, #10b981)"
    : "linear-gradient(to bottom, #7f1d1d, #dc2626)";

  const card = document.createElement("div");
  card.style.background = "rgba(0,0,0,0.15)";
  card.style.padding = "45px 30px";
  card.style.borderRadius = "18px";
  card.style.color = "#FFFFFF";
  card.style.width = "85%";
  card.style.maxWidth = "420px";

  const icon = document.createElement("div");
  icon.style.fontSize = "52px";
  icon.style.marginBottom = "18px";
  icon.innerHTML = success ? "👤✔️" : "⏰❗";

  const text = document.createElement("div");
  text.style.fontSize = "22px";
  text.style.fontWeight = "bold";
  text.innerText = message;

  card.appendChild(icon);
  card.appendChild(text);
  overlay.appendChild(card);

  setTimeout(() => location.reload(), 4000);
}

/* SEND QR */
async function sendQR(qrValue) {

  document.getElementById("loadingOverlay").style.display = "flex";

  const response = await fetch(BACKEND_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `floor=${FLOOR}&qr=${encodeURIComponent(qrValue)}`
  });

  const data = await response.json();
  showResult(data.message, data.success);
}

/* SEND MANUAL */
async function submitManual() {

  const name = input.value.trim();

  if (!name) {
    alert("Please enter your name");
    return;
  }

  document.getElementById("loadingOverlay").style.display = "flex";

  const response = await fetch(BACKEND_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `floor=${FLOOR}&manualName=${encodeURIComponent(name)}`
  });

  const data = await response.json();
  showResult(data.message, data.success);
}

/* START QR */
function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices.length) {

      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {

          html5QrCode.stop();
          sendQR(qrCodeMessage);

        }
      );

    }

  });
}

startScanner();
loadNames();

</script>

</body>
</html>
