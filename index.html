<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
text-align:center;
}

/* HEADER */

header{
background:#1e40af;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* MAIN CARD */

.card{
background:white;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* QR */

#reader{
width:100%;
margin:auto;
}

/* DIVIDER */

.divider{
margin:20px 0;
font-weight:bold;
color:#777;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.tab{
flex:1;
padding:12px;
cursor:pointer;
background:#e5e7eb;
border:none;
font-weight:bold;
}

.tab.active{
background:#1e40af;
color:white;
}

/* SEARCH */

.search-container{
position:relative;
}

input{
padding:12px;
width:100%;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.suggestions{
position:absolute;
width:100%;
background:white;
border:1px solid #ccc;
border-top:none;
max-height:200px;
overflow-y:auto;
display:none;
text-align:left;
z-index:1000;
}

.suggestion-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestion-item:hover{
background:#f3f4f6;
}

/* BUTTON */

button.submit{
padding:12px;
width:100%;
margin-top:10px;
background:#1e40af;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

/* LOADING */

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

/* BOOK */

.book{
width:90px;
height:65px;
position:relative;
perspective:800px;
}

.cover{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#2b6cb0,#1e4e8c);
border-radius:6px;
}

.spine{
position:absolute;
left:-6px;
width:8px;
height:100%;
background:#173a6a;
}

.flip{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#3b82f6,#1e40af);
transform-origin:left;
animation:flip 1.4s infinite;
}

.page{
position:absolute;
width:96%;
height:92%;
background:white;
top:4%;
left:2%;
}

@keyframes flip{
0%{transform:rotateY(0)}
50%{transform:rotateY(-170deg)}
100%{transform:rotateY(0)}
}

</style>
</head>

<body>

<header id="title">Loading...</header>

<div class="card">

<h3>Scan QR Code</h3>
<div id="reader"></div>

<div class="divider">──────── OR ────────</div>

<h3>Manual Attendance</h3>

<div class="tabs">
<button class="tab active" onclick="switchTab('regular')">Regular</button>
<button class="tab" onclick="switchTab('elementary')">Elementary</button>
</div>

<div class="search-container">
<input id="nameInput" placeholder="Type name..." autocomplete="off">
<div id="suggestions" class="suggestions"></div>
</div>

<button class="submit" onclick="submitManual()">Submit Attendance</button>

</div>

<div id="loadingOverlay">
<div class="book">
<div class="cover"></div>
<div class="spine"></div>
<div class="page"></div>
<div class="flip"></div>
</div>
<p style="margin-top:20px;font-weight:bold;color:#1e40af">
Checking record...
</p>
</div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbyAhyftbAPUonU0nHTnV-5x-HCBq452lXyK5769amWy3THmiUX7h0KDJdIrgnnthBCaXA/exec"

const params=new URLSearchParams(window.location.search)
const FLOOR=params.get("floor")||"1stFloor"

document.getElementById("title").innerText="Attendance - "+FLOOR

let regularNames=[]
let elementaryNames=[]
let currentType="regular"

/* LOAD NAMES */

async function loadNames(){

const res=await fetch(BACKEND_URL+"?action=getNames")
const data=await res.json()

regularNames=data.regular
elementaryNames=data.elementary

}

/* SWITCH TAB */

function switchTab(type){

currentType=type

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(type==="regular")
document.querySelectorAll(".tab")[0].classList.add("active")
else
document.querySelectorAll(".tab")[1].classList.add("active")

document.getElementById("nameInput").value=""
document.getElementById("suggestions").style.display="none"

}

/* SEARCH */

const input=document.getElementById("nameInput")
const suggestions=document.getElementById("suggestions")

input.addEventListener("input",function(){

const query=this.value.toLowerCase()

suggestions.innerHTML=""

if(!query){
suggestions.style.display="none"
return
}

let list=currentType==="regular"?regularNames:elementaryNames

const filtered=list.filter(n=>n.toLowerCase().includes(query))

if(filtered.length===0){
suggestions.style.display="none"
return
}

filtered.slice(0,10).forEach(name=>{

const div=document.createElement("div")
div.className="suggestion-item"
div.textContent=name

div.onclick=function(){
input.value=name
suggestions.style.display="none"
}

suggestions.appendChild(div)

})

suggestions.style.display="block"

})

document.addEventListener("click",function(e){

if(!e.target.closest(".search-container"))
suggestions.style.display="none"

})

/* RESULT */

function showResult(message,success){

const overlay=document.getElementById("loadingOverlay")

overlay.innerHTML=""

overlay.style.display="flex"

overlay.style.background=success?
"linear-gradient(#065f46,#10b981)":
"linear-gradient(#7f1d1d,#dc2626)"

const card=document.createElement("div")

card.style.background="rgba(0,0,0,0.15)"
card.style.padding="40px"
card.style.borderRadius="16px"
card.style.color="white"
card.style.fontSize="22px"
card.style.fontWeight="bold"

card.innerText=message

overlay.appendChild(card)

setTimeout(()=>location.reload(),4000)

}

/* SEND QR */

async function sendQR(qr){

document.getElementById("loadingOverlay").style.display="flex"

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`floor=${FLOOR}&qr=${encodeURIComponent(qr)}`
})

const data=await res.json()

showResult(data.message,data.success)

}

/* MANUAL */

async function submitManual(){

const name=input.value.trim()

if(!name){
alert("Please enter name")
return
}

document.getElementById("loadingOverlay").style.display="flex"

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`floor=${FLOOR}&type=${currentType}&manualName=${encodeURIComponent(name)}`
})

const data=await res.json()

showResult(data.message,data.success)

}

/* QR */

function startScanner(){

const qr=new Html5Qrcode("reader")

Html5Qrcode.getCameras().then(devices=>{

if(devices.length){

qr.start(
devices[0].id,
{fps:10,qrbox:250},
msg=>{
qr.stop()
sendQR(msg)
}
)

}

})

}

startScanner()
loadNames()

</script>

</body>
</html>
