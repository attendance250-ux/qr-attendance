<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.book {
  width: 60px;
  height: 40px;
  position: relative;
  perspective: 200px;
}

.page {
  width: 100%;
  height: 100%;
  background: #8b5e3c;
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: left;
  animation: flip 1s infinite;
}

@keyframes flip {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(-180deg); }
  100% { transform: rotateY(0deg); }
}
</style>

</head>

<body style="margin:0;font-family:Arial;text-align:center;">

<h2>Loading...</h2>
<div id="reader" style="width:100%;"></div>
<h3 id="result"></h3>

<!-- 📖 Loading Overlay -->
<div id="loadingOverlay">
  <div class="book">
    <div class="page"></div>
  </div>
  <p style="margin-top:15px;font-weight:bold;">Checking record...</p>
</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyAhyftbAPUonU0nHTnV-5x-HCBq452lXyK5769amWy3THmiUX7h0KDJdIrgnnthBCaXA/exec";

const params = new URLSearchParams(window.location.search);
const FLOOR = params.get("floor") || "1stFloor";

document.querySelector("h2").innerText = "Scan QR - " + FLOOR;

function showResult(message, success) {
  document.body.style.backgroundColor = success ? "green" : "red";
  document.getElementById("result").innerText = message;

  setTimeout(() => {
    location.reload();
  }, 2500);
}

async function sendToBackend(qrCodeMessage) {

  document.getElementById("loadingOverlay").style.display = "flex";

  try {
    const response = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `floor=${encodeURIComponent(FLOOR)}&qr=${encodeURIComponent(qrCodeMessage)}`
    });

    const data = await response.json();

    document.getElementById("loadingOverlay").style.display = "none";

    showResult(data.message, data.success);

  } catch (error) {
    document.getElementById("loadingOverlay").style.display = "none";
    showResult("Connection Error", false);
  }
}

function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices.length) {

      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {

          html5QrCode.stop();
          sendToBackend(qrCodeMessage);

        }
      );

    } else {
      document.getElementById("result").innerText = "No camera found.";
    }

  }).catch(err => {
    document.getElementById("result").innerText = "Camera Error: " + err;
  });
}

startScanner();

</script>

</body>
</html>
