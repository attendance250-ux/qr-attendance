<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

/* Book Container */
.book {
  width: 90px;
  height: 65px;
  position: relative;
  perspective: 800px;
}

/* Blue Cover (static back cover) */
.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #2b6cb0, #1e4e8c);
  border-radius: 6px;
  box-shadow: 0 12px 20px rgba(0,0,0,0.25);
}

/* Spine */
.spine {
  position: absolute;
  left: -6px;
  width: 8px;
  height: 100%;
  background: #173a6a;
  border-radius: 4px 0 0 4px;
}

/* Flipping Front Cover */
.flip {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #3b82f6, #1e40af);
  border-radius: 6px;
  transform-origin: left;
  animation: realisticFlip 1.4s infinite ease-in-out;
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Inner Page */
.page {
  position: absolute;
  width: 96%;
  height: 92%;
  background: #ffffff;
  top: 4%;
  left: 2%;
  border-radius: 4px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.08);
}

@keyframes realisticFlip {
  0%   { transform: rotateY(0deg); }
  50%  { transform: rotateY(-170deg); }
  100% { transform: rotateY(0deg); }
}
</style>

</head>

<body style="margin:0;font-family:Arial;text-align:center;">

<h2>Loading...</h2>
<div id="reader" style="width:100%;"></div>
<h3 id="result"></h3>

<!-- 📘 Loading Overlay -->
<div id="loadingOverlay">
  <div class="book">
    <div class="cover"></div>
    <div class="spine"></div>
    <div class="page"></div>
    <div class="flip"></div>
  </div>
  <p style="margin-top:22px;font-weight:bold;color:#1e40af;">
    Checking record...
  </p>
</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyAhyftbAPUonU0nHTnV-5x-HCBq452lXyK5769amWy3THmiUX7h0KDJdIrgnnthBCaXA/exec";

const params = new URLSearchParams(window.location.search);
const FLOOR = params.get("floor") || "1stFloor";

document.querySelector("h2").innerText = "Scan QR - " + FLOOR;


/* 🔥 PREMIUM RESULT SCREEN */
function showResult(message, success) {

  const overlay = document.getElementById("loadingOverlay");
  overlay.innerHTML = "";
  overlay.style.display = "flex";

  overlay.style.background = success
    ? "linear-gradient(to bottom, #065f46, #10b981)"
    : "linear-gradient(to bottom, #7f1d1d, #dc2626)";

  const card = document.createElement("div");
  card.style.background = "rgba(0,0,0,0.15)";
  card.style.padding = "45px 30px";
  card.style.borderRadius = "18px";
  card.style.textAlign = "center";
  card.style.color = "#FFFFFF";
  card.style.width = "85%";
  card.style.maxWidth = "420px";
  card.style.boxShadow = "0 15px 35px rgba(0,0,0,0.35)";

  const icon = document.createElement("div");
  icon.style.fontSize = "52px";
  icon.style.marginBottom = "18px";
  icon.innerHTML = success ? "👤✔️" : "⏰❗";

  const text = document.createElement("div");
  text.style.fontSize = "22px";
  text.style.fontWeight = "bold";
  text.style.lineHeight = "1.4";
  text.innerText = message;

  card.appendChild(icon);
  card.appendChild(text);
  overlay.appendChild(card);

  setTimeout(() => {
    location.reload();
  }, 4000);
}


async function sendToBackend(qrCodeMessage) {

  document.getElementById("loadingOverlay").style.display = "flex";

  try {
    const response = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: `floor=${encodeURIComponent(FLOOR)}&qr=${encodeURIComponent(qrCodeMessage)}`
    });

    const data = await response.json();

    showResult(data.message, data.success);

  } catch (error) {
    showResult("Connection Error", false);
  }
}

function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices.length) {

      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {

          html5QrCode.stop();
          sendToBackend(qrCodeMessage);

        }
      );

    } else {
      document.getElementById("result").innerText = "No camera found.";
    }

  }).catch(err => {
    document.getElementById("result").innerText = "Camera Error: " + err;
  });
}

startScanner();

</script>

</body>
</html>
